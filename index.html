<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VEKSEL APP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .logo { font-size: 32px; font-weight: bold; color: #0088cc; margin-bottom: 10px; text-shadow: 0 0 15px #0088cc; }
        .table-box { background: #111; border: 1px solid #333; border-radius: 20px; padding: 20px; margin: 20px 0; }
        .slots { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .slot { width: 45px; height: 45px; background: #222; border-radius: 12px; line-height: 45px; border: 1px solid #444; }
        .active { background: #0088cc; border-color: #5ac8fa; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .wallet { font-size: 11px; color: #666; background: #0a0a0a; padding: 10px; border-radius: 10px; margin-top: 30px; word-break: break-all; }
        .play-btn { background: linear-gradient(180deg, #0088cc, #005588); color: white; border: none; padding: 20px; width: 100%; border-radius: 15px; font-size: 20px; font-weight: bold; margin-top: 40px; box-shadow: 0 5px 15px rgba(0,136,204,0.3); }
        .insurance { color: #4cd964; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="logo">VEKSEL</div>
    <div class="table-box">
        <div>ОЧЕРЕДЬ (СМЕЩЕНИЕ ВЛЕВО)</div>
        <div class="slots">
            <div class="slot">№5</div><div class="slot">№4</div><div class="slot">№3</div><div class="slot">№2</div><div class="slot active">№1</div>
        </div>
    </div>
    <div class="wallet">TON: UQAg_G-0S0H9XJ_p_R-y9L0W-H-6zG3-Y-0-E-R-O-L-L</div>
    <button class="play-btn" onclick="Telegram.WebApp.showAlert('Вексель активирован! Ожидайте подтверждения в сети TON.')">PLAY (ИГРАТЬ)</button>
    <div class="insurance">🛡 Страховой фонд: 10 Векселей АКТИВНО</div>
    <script>let tg = window.Telegram.WebApp; tg.expand();</script>
</body>
</html>
