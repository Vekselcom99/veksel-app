<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VEKSEL DYNAMIC TABLE</title>
    <style>
        :root { --neon: #00f2ff; --bg: #000814; --pink: #ff007a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; font-weight: bold; }
        body { background: var(--bg); color: white; height: 100vh; width: 100vw; overflow: hidden; }

        .screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; flex-direction: column; align-items: center; background: radial-gradient(circle at center, #003d5c 0%, #000814 100%); }
        .active { display: flex !important; }

        /* Шапка и Навигация */
        .veksel-header { font-size: 2.2rem; letter-spacing: 6px; color: var(--neon); text-shadow: 0 0 15px var(--neon); margin: 20px 0; text-align: center; }
        .top-nav { width: 100%; display: flex; justify-content: space-between; padding: 15px; position: absolute; top: 0; z-index: 200; }
        .icon-box { width: 45px; height: 45px; border: 1px solid var(--neon); border-radius: 12px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); }

        /* Стол */
        .table-container { position: relative; width: 300px; height: 160px; border: 4px solid var(--neon); border-radius: 100px; margin-top: 40px; box-shadow: inset 0 0 25px var(--neon), 0 0 15px rgba(0,242,255,0.3); }
        .player-node { position: absolute; width: 34px; height: 34px; border: 2px solid var(--neon); border-radius: 50%; background: #000; display: flex; align-items: center; justify-content: center; font-size: 10px; transition: all 0.5s ease; box-shadow: 0 0 10px var(--neon); }
        .player-you { border-color: white; color: white; box-shadow: 0 0 15px white; }

        .neon-btn { width: 280px; background: rgba(0, 242, 255, 0.1); border: 2px solid var(--neon); color: white; padding: 14px; border-radius: 12px; text-transform: uppercase; cursor: pointer; font-size: 14px; margin-top: 10px; }
        .back-btn { margin-top: auto; padding-bottom: 30px; color: var(--neon); cursor: pointer; text-transform: uppercase; font-size: 14px; }
        
        canvas { filter: drop-shadow(0 0 10px var(--neon)); }
    </style>
</head>
<body>

<section id="table" class="screen active">
    <div class="top-nav">
        <div class="icon-box" style="border-color: var(--pink);">👛</div>
        <canvas id="mini-globe" width="60" height="60"></canvas> <div class="icon-box">👤</div>
    </div>

    <div style="margin-top: 80px; text-align: center;">
        <div style="width:35px; height:35px; border:2px solid var(--neon); border-radius:50%; margin: 0 auto 5px; display:flex; align-items:center; justify-content:center;">👤</div>
        <p style="font-size: 10px; color: var(--neon); letter-spacing: 2px;">ЖДЕМ...</p>
    </div>

    <div class="table-container" id="main-table">
        <div style="position:absolute; width:100%; text-align:center; top:40%; font-size:14px; letter-spacing:1px; z-index: 1;">
            <span style="font-size: 10px; opacity: 0.7;">БАНК ТУРА</span><br>
            100 VEKSEL
        </div>
        <div id="seats-layer"></div>
    </div>

    <div style="margin-top: 30px; border: 1px solid var(--neon); padding: 10px 25px; border-radius: 12px; background: rgba(0,242,255,0.05); font-size: 14px;">
        balans: 10 VEK
    </div>

    <div class="back-btn">НАЗАД</div>
</section>

<script>
    // НАСТРОЙКА КОЛИЧЕСТВА ИГРОКОВ
    // Поменяй это число, чтобы увидеть, как они распределяются!
    let currentPlayers = 6; 

    function renderTable(count) {
        const container = document.getElementById('seats-layer');
        container.innerHTML = ''; // Очистка
        
        const width = 300; // Ширина овала
        const height = 160; // Высота овала
        const centerX = width / 2;
        const centerY = height / 2;
        const radiusX = 135; // Радиус по X
        const radiusY = 70;  // Радиус по Y

        for (let i = 0; i < count; i++) {
            // Расчет угла для каждого игрока
            const angle = (i / count) * Math.PI * 2;
            
            // Координаты на овале
            const x = centerX + radiusX * Math.cos(angle) - 17;
            const y = centerY + radiusY * Math.sin(angle) - 17;

            const seat = document.createElement('div');
            seat.className = 'player-node';
            if (i === 0) { // Пусть первый всегда будет "Вы"
                seat.classList.add('player-you');
                seat.innerHTML = 'Вы';
            } else {
                seat.innerHTML = '👤';
            }
            
            seat.style.left = x + 'px';
            seat.style.top = y + 'px';
            container.appendChild(seat);
        }
    }

    // ГЛОБУС (Мини-версия для стола)
    let pts = [];
    for(let i=0; i<80; i++) {
        const t = Math.acos(-1 + (2*i)/80), p = Math.sqrt(80*Math.PI)*t;
        pts.push({x: Math.cos(p)*Math.sin(t), y: Math.sin(p)*Math.sin(t), z: Math.cos(t)});
    }

    let angle = 0;
    function animate() {
        const cvs = document.getElementById('mini-globe');
        const ctx = cvs.getContext('2d');
        ctx.clearRect(0,0,60,60);
        angle += 0.02;
        pts.forEach(p => {
            const x1 = p.x*Math.cos(angle) - p.z*Math.sin(angle);
            const z1 = p.x*Math.sin(angle) + p.z*Math.cos(angle);
            const sc = 1 / (2 - z1);
            const gx = x1 * 28 * sc + 30;
            const gy = p.y * 28 * sc + 30;
            ctx.fillStyle = `rgba(0, 242, 255, ${(z1+1)/2})`;
            ctx.beginPath(); ctx.arc(gx, gy, 0.8, 0, 7); ctx.fill();
        });
        requestAnimationFrame(animate);
    }

    // Запуск
    renderTable(currentPlayers);
    animate();
</script>
</body>
</html>
