<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VEKSEL ONLINE</title>
    <style>
        :root { --main-blue: #0088cc; --dark-bg: #0a0a0a; }
        body { background-color: var(--dark-bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; overflow: hidden; }
        
        .screen { display: none; width: 100vw; height: 100vh; flex-direction: column; }
        .active { display: flex; }

        /* ЛОГОТИП (Синий рисунок) */
        .logo-container { margin: 20px auto; text-align: center; }
        .blue-logo { 
            width: 80px; height: 80px; border: 3px solid var(--main-blue); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--main-blue); font-size: 40px; color: var(--main-blue);
        }

        /* ИГРОВОЙ СТОЛ (Стиль онлайн-игры) */
        .game-area { position: relative; width: 300px; height: 300px; margin: 20px auto; background: radial-gradient(circle, #1a1a1a 0%, #000 70%); border-radius: 50%; border: 2px solid #333; }
        .slot { 
            position: absolute; width: 40px; height: 40px; border: 1px solid var(--main-blue); 
            border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px;
            background: rgba(0, 136, 204, 0.1); transition: 0.3s;
        }
        .slot.occupied { background: var(--main-blue); box-shadow: 0 0 10px var(--main-blue); }
        .queue-11 { 
            position: absolute; bottom: -50px; left: 50%; transform: translateX(-50%);
            border: 2px dashed #555; padding: 5px 15px; border-radius: 5px; color: #555;
        }
        .queue-active { border-color: #00ff00; color: #00ff00; animation: pulse 1.5s infinite; }

        /* МЕНЮ И КНОПКИ */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; }
        .btn { 
            background: #1c1c1c; border: 1px solid #333; padding: 15px; color: #fff; 
            border-radius: 8px; font-weight: bold; text-align: center; cursor: pointer;
        }
        .btn-blue { background: var(--main-blue); border: none; }
        .stats { background: #111; padding: 15px; border-radius: 10px; margin: 10px 20px; border-left: 4px solid var(--main-blue); }

        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="main" class="screen active">
        <div class="logo-container">
            <div class="blue-logo">🌐</div>
            <h2 style="color:var(--main-blue)">VEKSEL</h2>
        </div>
        
        <div class="stats">
            <div>БАЛАНС: <span id="bal">0</span> VEK</div>
            <div style="font-size: 12px; color: #aaa;">В БАНКЕ СТОЛА: 110 TON</div>
        </div>

        <div class="game-area" id="table">
            <div class="queue-11" id="q11">ЖДЕМ 11-ГО...</div>
        </div>

        <div class="menu-grid">
            <div class="btn btn-blue" onclick="deposit()">ПОПОЛНИТЬ</div>
            <div class="btn" onclick="withdraw()">ВЫВОД</div>
            <div class="btn" style="grid-column: span 2;" onclick="showExchange()">ОБМЕН (TON/VEKSEL)</div>
        </div>
    </div>

    <div id="exchange" class="screen">
        <h2 style="text-align:center; margin-top:50px;">ОБМЕН ВАЛЮТЫ</h2>
        <div class="stats" style="margin-top:20px; text-align:center;">
            <p>10 TON = 10 VEKSEL</p>
            <button class="btn btn-blue" style="width:100%" onclick="doExchange()">ОБМЕНЯТЬ</button>
        </div>
        <div class="btn" style="margin: 20px;" onclick="showMain()">НАЗАД В МЕНЮ</div>
    </div>

    <script>
        let balance = 0;
        
        // Рисуем стол как в онлайн игре
        const table = document.getElementById('table');
        for (let i = 0; i < 10; i++) {
            const slot = document.createElement('div');
            slot.className = 'slot occupied'; // По умолчанию заняты
            const angle = (i / 10) * 2 * Math.PI - Math.PI/2;
            slot.style.left = (130 + 110 * Math.cos(angle)) + 'px';
            slot.style.top = (130 + 110 * Math.sin(angle)) + 'px';
            slot.innerText = i + 1;
            table.appendChild(slot);
        }

        function deposit() {
            balance += 10;
            document.getElementById('bal').innerText = balance;
            alert("Счет пополнен на 10 TON");
        }

        function withdraw() {
            if(balance <= 0) {
                alert("Недостаточно средств для вывода");
            } else {
                alert("Запрос на вывод " + balance + " VEK отправлен");
                balance = 0;
                document.getElementById('bal').innerText = balance;
            }
        }

        function showExchange() {
            document.getElementById('main').classList.remove('active');
            document.getElementById('exchange').classList.add('active');
        }

        function showMain() {
            document.getElementById('exchange').classList.remove('active');
            document.getElementById('main').classList.add('active');
        }

        function doExchange() {
            alert("Обмен успешно выполнен!");
            showMain();
        }

        // Эмуляция ожидания 11-го игрока
        setInterval(() => {
            const q = document.getElementById('q11');
            q.classList.toggle('queue-active');
            q.innerText = q.classList.contains('queue-active') ? "11-Й В ОЧЕРЕДИ!" : "ЖДЕМ 11-ГО...";
        }, 2000);
    </script>
</body>
</html>
