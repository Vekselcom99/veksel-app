<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VEKSEL</title>
    <style>
        /* Тот самый синий фон, о котором мы говорили */
        body { 
            background: radial-gradient(circle at center, #001f3f 0%, #000b1a 100%); 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            height: 100vh;
        }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }

        /* Элементы главного меню (Эскиз 6) */
        .globe-wrapper {
            width: 160px; height: 160px;
            border-radius: 50%;
            border: 2px solid #0088cc;
            box-shadow: 0 0 30px #0088cc;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 15px;
            background: rgba(0, 136, 204, 0.1);
        }

        .veksel-title { font-size: 36px; font-weight: bold; letter-spacing: 4px; margin-bottom: 20px; text-shadow: 0 0 10px #0088cc; }

        .menu-list { width: 80%; display: flex; flex-direction: column; gap: 10px; }
        
        .m-btn { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(0, 136, 204, 0.5); 
            padding: 15px; 
            font-weight: bold; 
            text-align: center; 
            border-radius: 5px;
            text-transform: uppercase;
        }

        /* Окно обмена (Эскиз 4) */
        .exchange-card {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #0088cc;
            border-radius: 15px;
            padding: 25px;
            width: 80%;
            box-shadow: 0 0 20px rgba(0, 136, 204, 0.4);
        }

        /* Стол (Эскиз 2 и 5) */
        .table-bg {
            width: 240px; height: 240px;
            border: 1px solid #0088cc;
            border-radius: 50%;
            position: relative;
            background: rgba(0, 136, 204, 0.05);
        }
        .p-dot { position: absolute; width: 12px; height: 12px; background: #0088cc; border-radius: 50%; box-shadow: 0 0 5px #fff; }

        .btn-back { margin-top: 30px; color: #555; border: none; background: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="sc6" class="screen active">
        <div style="position: absolute; top: 20px; left: 20px; font-size: 14px; color: #0088cc;">ПРОФИЛЬ 👤</div>
        <div class="globe-wrapper">
            <span style="font-size: 60px;">🌐</span>
        </div>
        <div class="veksel-title">VEKSEL</div>
        <div class="menu-list">
            <div class="m-btn" onclick="show(2)">ГЛАВНАЯ (СТОЛ)</div>
            <div class="m-btn" onclick="show(4)">ОБМЕН</div>
            <div class="m-btn">БАЛАНС</div>
            <div class="m-btn">ВЫВОД</div>
            <div class="m-btn">ПРАВИЛА</div>
        </div>
    </div>

    <div id="sc2" class="screen">
        <h3>ОЧЕРЕДЬ ТУРА</h3>
        <div class="table-bg" id="table2"></div>
        <p>В БАНКЕ: 110 TON</p>
        <button class="m-btn" style="width: 200px; background: #0088cc;" onclick="show(3)">ДАЛЕЕ</button>
        <button class="btn-back" onclick="show(6)">НАЗАД В МЕНЮ</button>
    </div>

    <div id="sc3" class="screen">
        <h3>ЦЕПОЧКА</h3>
        <p style="padding: 0 30px; font-size: 14px;">Компенсация 11-му игроку из фонда комиссии VEKSEL. Никакого обмана.</p>
        <div class="table-bg" style="width:160px; height:160px;" id="table3"></div>
        <button class="btn-back" onclick="show(6)">В МЕНЮ</button>
    </div>

    <div id="sc4" class="screen">
        <div class="veksel-title" style="font-size: 24px;">ОБМЕН</div>
        <div class="exchange-card">
            <div style="display:flex; justify-content:space-between;"><span>TON</span><span>10</span></div>
            <hr style="border: 0.5px solid #0088cc; margin: 15px 0;">
            <div style="display:flex; justify-content:space-between;"><span>VEKSEL</span><span>10</span></div>
            <button class="m-btn" style="width:100%; margin-top:20px; background:#0088cc;">ОБМЕНЯТЬ</button>
        </div>
        <button class="btn-back" onclick="show(6)">НАЗАД</button>
    </div>

    <script>
        function show(n) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('sc' + n).classList.add('active');
            if(n==2) draw('table2', 10);
            if(n==3) draw('table3', 8);
        }

        function draw(id, count) {
            const el = document.getElementById(id); el.innerHTML = '';
            for(let i=0; i<count; i++) {
                const d = document.createElement('div'); d.className = 'p-dot';
                const a = (i/count) * 2 * Math.PI;
                d.style.left = (el.offsetWidth/2 - 6 + (el.offsetWidth/2 - 15) * Math.cos(a)) + 'px';
                d.style.top = (el.offsetHeight/2 - 6 + (el.offsetHeight/2 - 15) * Math.sin(a)) + 'px';
                el.appendChild(d);
            }
        }
    </script>
</body>
</html>
