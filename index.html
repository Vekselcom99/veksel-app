<script>
    // --- ИНИЦИАЛИЗАЦИЯ TON CONNECT ---
    const connector = new TonConnectSDK.TonConnect({
        manifestUrl: 'https://vekselcom99.github.io/veksel-app/tonconnect-manifest.json'
    });

    // Функция для открытия кошелька (Улучшенная версия)
    async function connectWallet() {
        const walletLink = 'https://t.me/wallet/aws'; // Прямая ссылка на TON Space
        
        try {
            // 1. Пытаемся получить ссылку от SDK
            const connectUrl = await connector.connect({
                universalLink: walletLink,
                bridgeUrl: 'https://bridge.tonapi.io/bridge'
            });

            // 2. Если SDK выдал ссылку, переходим по ней
            if (connectUrl) {
                window.location.href = connectUrl;
            } else {
                // 3. Если SDK молчит, открываем TON Space напрямую
                window.location.href = walletLink;
            }
        } catch (e) {
            console.error("Ошибка подключения:", e);
            // Запасной вариант: просто открываем кошелек
            window.location.href = walletLink;
        }
    }

    async function handleExchange() {
        // Проверка подключения перед обменом
        if (!connector.connected) {
            alert("Сначала подключите кошелек (нажмите на иконку 👛)");
            return connectWallet();
        }

        const amount = document.getElementById('exchange-input').value;
        const transaction = {
            validUntil: Math.floor(Date.now() / 1000) + 600,
            messages: [{
                address: "UQAVDUtqijqgsx5R7-0WDZt-DpouD-CRJTFHsNNaJYVHDDpP",
                amount: (amount * 1000000000).toString()
            }]
        };

        try {
            await connector.sendTransaction(transaction);
            alert("Транзакция отправлена!");
        } catch (e) {
            alert("Транзакция отменена или произошла ошибка.");
        }
    }

    // --- УПРАВЛЕНИЕ ИНТЕРФЕЙСОМ ---
    function show(id) {
        // Скрываем все экраны и показываем нужный
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const target = document.getElementById(id);
        if(target) {
            target.classList.add('active');
            if(id === 'table') renderTable(10);
        }
    }

    // Синхронизация полей ввода
    const inputField = document.getElementById('exchange-input');
    if (inputField) {
        inputField.oninput = (e) => {
            document.getElementById('veksel-output').value = e.target.value;
        };
    }

    // --- ГРАФИКА И ЗАГРУЗКА ---
    let pts = [];
    for(let i=0; i<120; i++) {
        const t = Math.acos(-1 + (2*i)/120), p = Math.sqrt(120*Math.PI)*t;
        pts.push({x: Math.cos(p)*Math.sin(t), y: Math.sin(p)*Math.sin(t), z: Math.cos(t)});
    }
    
    let angle = 0;
    function draw() {
        angle += 0.015;
        document.querySelectorAll('.globe-canvas').forEach(cvs => {
            const ctx = cvs.getContext('2d');
            const size = cvs.width;
            ctx.clearRect(0,0,size,size);
            pts.forEach(p => {
                const x1 = p.x*Math.cos(angle) - p.z*Math.sin(angle);
                const z1 = p.x*Math.sin(angle) + p.z*Math.cos(angle);
                const sc = 1 / (2.2 - z1);
                const gx = x1 * (size*0.48) * sc + size/2;
                const gy = p.y * (size*0.48) * sc + size/2;
                ctx.fillStyle = `rgba(0, 242, 255, ${(z1+1)/2})`;
                ctx.beginPath(); ctx.arc(gx, gy, size/100, 0, 7); ctx.fill();
            });
        });
        requestAnimationFrame(draw);
    }

    function renderTable(count) {
        const layer = document.getElementById('dynamic-seats');
        if(!layer) return;
        layer.innerHTML = '';
        for (let i = 0; i < count; i++) {
            const a = (i / count) * Math.PI * 2;
            const x = 150 + 130 * Math.cos(a) - 16;
            const y = 80 + 65 * Math.sin(a) - 16;
            const p = document.createElement('div');
            p.className = 'player-node';
            p.style.left = x + 'px'; p.style.top = y + 'px';
            p.innerHTML = i === 4 ? 'Вы' : '👤';
            layer.appendChild(p);
        }
    }

    let prg = 0;
    const loader = setInterval(() => {
        prg += 2;
        const fill = document.getElementById('load-fill');
        if(fill) fill.style.width = prg + '%';
        if(prg >= 100) { clearInterval(loader); show('menu'); }
    }, 30);

    draw();
</script>
