<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VEKSEL RESTORED EDITION</title>
    <script src="https://unpkg.com/@tonconnect/sdk@latest/dist/tonconnect-sdk.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #000814; --pink: #ff007a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; font-weight: bold; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; height: 100vh; width: 100vw; overflow: hidden; }

        .screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; flex-direction: column; align-items: center; background: radial-gradient(circle at center, #003d5c 0%, #000814 100%); z-index: 10; }
        .active { display: flex !important; z-index: 100; }

        .veksel-header { font-size: 2.2rem; letter-spacing: 6px; color: var(--neon); text-shadow: 0 0 15px var(--neon); margin: 20px 0; text-align: center; }
        .neon-btn { width: 280px; background: rgba(0, 242, 255, 0.1); border: 2px solid var(--neon); color: white; padding: 14px; border-radius: 12px; margin-bottom: 12px; text-transform: uppercase; text-align: center; cursor: pointer; font-size: 14px; }
        
        .top-nav { width: 100%; display: flex; justify-content: space-between; padding: 15px; position: absolute; top: 0; z-index: 200; }
        .icon-box { width: 45px; height: 45px; border: 1px solid var(--neon); border-radius: 12px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); cursor: pointer; }

        .main-frame { border: 2px solid var(--neon); padding: 25px; border-radius: 20px; text-align:center; width: 92%; background: rgba(0,0,0,0.6); box-shadow: 0 0 20px rgba(0,242,255,0.2); }
        .input-line { width: 100%; background: none; border: none; border-bottom: 1px solid rgba(0,242,255,0.5); color: white; margin: 5px 0 15px; text-align: center; font-size: 18px; outline: none; }

        .back-btn { margin-top: auto; padding-bottom: 30px; color: var(--neon); cursor: pointer; text-transform: uppercase; font-size: 14px; text-decoration: none; letter-spacing: 1px; }
        
        #load-fill { width: 0%; height: 100%; background: var(--neon); transition: width 0.1s; }
        canvas { filter: drop-shadow(0 0 10px var(--neon)); }
        
        .player-node { position: absolute; width: 32px; height: 32px; border: 2px solid var(--neon); border-radius: 50%; background: #000; display: flex; align-items: center; justify-content: center; font-size: 10px; box-shadow: 0 0 10px var(--neon); }
    </style>
</head>
<body onclick="playClick()">

<section id="splash" class="screen active" style="justify-content: center;">
    <canvas class="globe-canvas" width="220" height="220"></canvas>
    <div class="veksel-header">VEKSEL</div>
    <div style="width: 200px; height: 4px; background: #111; border-radius: 2px; overflow: hidden;"><div id="load-fill"></div></div>
</section>

<section id="menu" class="screen">
    <div class="top-nav">
        <div class="icon-box" onclick="connectWallet()">👛</div>
        <div class="icon-box" onclick="show('profile')">👤</div>
    </div>
    <div class="veksel-header" style="margin-top: 80px;">VEKSEL</div>
    <button class="neon-btn" onclick="show('table')">СТОЛ</button>
    <button class="neon-btn" onclick="show('exchange')">ОБМЕН</button>
    <button class="neon-btn" onclick="show('withdraw')">ВЫВОД</button>
    <button class="neon-btn" onclick="connectWallet()">ПОДКЛЮЧИТЬ КОШЕЛЕК</button>
</section>

<section id="profile" class="screen">
    <div class="veksel-header">ПРОФИЛЬ</div>
    <div style="display:flex; width:100%; align-items:center; justify-content: center;">
        <canvas class="globe-canvas" width="160" height="160"></canvas>
        <div style="display:flex; flex-direction:column; margin-left: 10px;">
            <button class="neon-btn" style="width:140px; padding:10px; font-size:11px;" onclick="show('menu')">ГЛАВНАЯ</button>
            <button class="neon-btn" style="width:140px; padding:10px; font-size:11px;" onclick="connectWallet()">КОШЕЛЕК</button>
            <button class="neon-btn" style="width:140px; padding:10px; font-size:11px;" onclick="show('exchange')">ОБМЕН</button>
            <button class="neon-btn" style="width:140px; padding:10px; font-size:11px;" onclick="show('rules')">ПРАВИЛА</button>
        </div>
    </div>
    <div class="back-btn" onclick="show('menu')">НАЗАД</div>
</section>

<section id="table" class="screen">
    <div class="top-nav">
        <div class="icon-box" style="border-color: var(--pink);" onclick="connectWallet()">👛</div>
        <canvas class="globe-canvas" width="60" height="60"></canvas> 
        <div class="icon-box" onclick="show('profile')">👤</div>
    </div>
    <div style="margin-top: 80px; text-align: center;">
        <div style="width:32px; height:32px; border:2px solid var(--neon); border-radius:50%; margin: 0 auto 5px; display:flex; align-items:center; justify-content:center;">👤</div>
        <p style="font-size: 10px; color: var(--neon);">ЖДЕМ...</p>
    </div>
    <div style="position: relative; width: 300px; height: 160px; border: 4px solid var(--neon); border-radius: 100px; margin-top: 30px; box-shadow: inset 0 0 20px var(--neon);">
        <div style="position:absolute; width:100%; text-align:center; top:42%; font-size:14px;">100 VEKSEL</div>
        <div id="dynamic-seats"></div>
    </div>
    <div class="back-btn" onclick="show('menu')">НАЗАД</div>
</section>

<section id="exchange" class="screen">
    <canvas class="globe-canvas" width="150" height="150" style="margin-top:20px;"></canvas>
    <div class="main-frame">
        <h2 style="color:var(--neon); margin-bottom: 20px; letter-spacing: 2px;">ОБМЕН</h2>
        <div style="display:flex; justify-content: space-between; align-items:center;">
            <div style="text-align:left; flex:1;">
                <p style="font-size:9px; opacity:0.7;">ОТДАЕТЕ (TON)</p>
                <input type="number" id="exchange-input" value="1" class="input-line" style="text-align:left; font-size:22px;">
            </div>
            <div style="font-size:20px; color:var(--pink);">👛</div>
        </div>
        <div style="display:flex; justify-content: space-between; align-items:center;">
            <div style="text-align:left; flex:1;">
                <p style="font-size:9px; opacity:0.7;">ПОЛУЧАЕТЕ (VEKSEL)</p>
                <input type="number" id="veksel-output" value="1" class="input-line" style="text-align:left; font-size:22px;" readonly>
            </div>
            <div style="font-size:20px; color:var(--neon);">👤</div>
        </div>
        <button class="neon-btn" onclick="handleExchange()" style="width:100%; border-color: var(--pink); margin-top:10px;">ОБМЕНЯТЬ</button>
    </div>
    <div class="back-btn" onclick="show('menu')">НАЗАД</div>
</section>

<section id="withdraw" class="screen">
    <div class="main-frame" style="margin-top:50px;">
        <h2 style="color:var(--neon);">ВЫВОД</h2>
        <input type="number" placeholder="СУММА TON" class="input-line">
        <input type="text" placeholder="АДРЕС ВАШЕГО КОШЕЛЬКА" class="input-line">
        <button class="neon-btn" style="width:100%;">ПОДТВЕРДИТЬ</button>
    </div>
    <div class="back-btn" onclick="show('menu')">НАЗАД</div>
</section>

<script>
    // --- НАСТРОЙКА TON CONNECT ---
    const connector = new TonConnectSDK.TonConnect({
        manifestUrl: 'https://vekselcom99.github.io/veksel-app/tonconnect-manifest.json'
    });

    async function connectWallet() {
        const walletConnectionSource = {
            universalLink: 'https://t.me/wallet/aws', // Ссылка для TON Space
            bridgeUrl: 'https://bridge.tonapi.io/bridge'
        };
        try {
            await connector.connect(walletConnectionSource);
        } catch (e) {
            console.error(e);
            alert("Пожалуйста, откройте TON Space в Telegram");
        }
    }

    async function handleExchange() {
        if (!connector.connected) {
            alert("Сначала подключите кошелек (нажмите на иконку 👛)");
            return connectWallet();
        }

        const amount = document.getElementById('exchange-input').value;
        const transaction = {
            validUntil: Math.floor(Date.now() / 1000) + 600,
            messages: [{
                address: "UQAVDUtqijqgsx5R7-0WDZt-DpouD-CRJTFHsNNaJYVHDDpP",
                amount: (amount * 1000000000).toString()
            }]
        };

        try {
            await connector.sendTransaction(transaction);
            alert("Транзакция отправлена!");
        } catch (e) {
            alert("Ошибка транзакции. Убедитесь, что кошелек подключен.");
        }
    }

    // Синхронизация полей ввода
    document.getElementById('exchange-input').oninput = (e) => {
        document.getElementById('veksel-output').value = e.target.value;
    };

    // --- ПЕРЕКЛЮЧЕНИЕ ЭКРАНОВ ---
    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const target = document.getElementById(id);
        if(target) {
            target.classList.add('active');
            if(id === 'table') renderTable(10);
        }
    }

    // --- ГРАФИКА (ШАР) ---
    let pts = [];
    for(let i=0; i<120; i++) {
        const t = Math.acos(-1 + (2*i)/120), p = Math.sqrt(120*Math.PI)*t;
        pts.push({x: Math.cos(p)*Math.sin(t), y: Math.sin(p)*Math.sin(t), z: Math.cos(t)});
    }
    let angle = 0;
    function draw() {
        angle += 0.015;
        document.querySelectorAll('.globe-canvas').forEach(cvs => {
            const ctx = cvs.getContext('2d');
            const size = cvs.width;
            ctx.clearRect(0,0,size,size);
            pts.forEach(p => {
                const x1 = p.x*Math.cos(angle) - p.z*Math.sin(angle);
                const z1 = p.x*Math.sin(angle) + p.z*Math.cos(angle);
                const sc = 1 / (2.2 - z1);
                const gx = x1 * (size*0.48) * sc + size/2;
                const gy = p.y * (size*0.48) * sc + size/2;
                ctx.fillStyle = `rgba(0, 242, 255, ${(z1+1)/2})`;
                ctx.beginPath(); ctx.arc(gx, gy, size/100, 0, 7); ctx.fill();
            });
        });
        requestAnimationFrame(draw);
    }

    function renderTable(count) {
        const layer = document.getElementById('dynamic-seats');
        if(!layer) return;
        layer.innerHTML = '';
        for (let i = 0; i < count; i++) {
            const a = (i / count) * Math.PI * 2;
            const x = 150 + 130 * Math.cos(a) - 16;
            const y = 80 + 65 * Math.sin(a) - 16;
            const p = document.createElement('div');
            p.className = 'player-node';
            p.style.left = x + 'px'; p.style.top = y + 'px';
            p.innerHTML = i === 4 ? 'Вы' : '👤';
            layer.appendChild(p);
        }
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playClick() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.01, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    }

    let prg = 0;
    const loader = setInterval(() => {
        prg += 2;
        const fill = document.getElementById('load-fill');
        if(fill) fill.style.width = prg + '%';
        if(prg >= 100) { clearInterval(loader); show('menu'); }
    }, 30);

    draw();
</script>
</body>
</html>
