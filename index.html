<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VEKSEL APP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Глобус из твоего эскиза №6 */
        .globe-container {
            margin: 20px 0;
            position: relative;
        }

        .globe {
            width: 150px;
            height: 150px;
            border: 2px solid #333;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #1a1a1a, #000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Меню справа как на листе №6 */
        .main-layout {
            display: flex;
            width: 100%;
            justify-content: space-between;
        }

        .menu-list {
            list-style: none;
            padding: 0;
            width: 45%;
        }

        .menu-item {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 10px;
            margin-bottom: 5px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
        }

        /* Окно обмена из эскиза №4 */
        .exchange-card {
            background: #111;
            border: 1px solid #0088cc;
            border-radius: 15px;
            padding: 15px;
            width: 100%;
            margin-top: 20px;
            text-align: center;
        }

        .currency-row {
            display: flex;
            justify-content: space-around;
            margin: 10px 0;
            font-size: 20px;
            font-weight: bold;
        }

        /* Кнопка подключения TON */
        .btn-ton {
            background-color: #0088cc;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            font-weight: bold;
            font-size: 16px;
            margin-top: 15px;
            cursor: pointer;
        }

        .veksel-logo {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 5px;
            color: #fff;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="veksel-logo">VEKSEL</div>

    <div class="main-layout">
        <div style="width: 50%;">
            <div class="globe">🌐</div>
            <div style="text-align: center; margin-top: 10px;">ПРОФИЛЬ</div>
        </div>

        <ul class="menu-list">
            <li class="menu-item">Главная</li>
            <li class="menu-item">Баланс</li>
            <li class="menu-item">Обмен</li>
            <li class="menu-item">Вывод</li>
            <li class="menu-item">Правила</li>
        </ul>
    </div>

    <div class="exchange-card">
        <div style="color: #888; font-size: 12px;">ОБМЕН ВАЛЮТЫ</div>
        <div class="currency-row">
            <span>TON</span>
            <span>=</span>
            <span style="color: #0088cc;">10</span>
        </div>
        <div style="border-bottom: 1px solid #333; margin: 10px 0;"></div>
        <div class="currency-row">
            <span>VEKSEL</span>
            <span>=</span>
            <span style="color: #00ff00;">10</span>
        </div>
        
        <button class="btn-ton" onclick="connectWallet()">ПОДКЛЮЧИТЬ КОШЕЛЕК</button>
        <div style="margin-top: 10px; font-size: 14px;">balans: 0 VEK</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function connectWallet() {
            tg.showConfirm("Подключить кошелек TON для участия в туре?");
        }
    </script>
</body>
</html>
