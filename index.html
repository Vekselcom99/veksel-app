<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VEKSEL - PRO EDITION</title>
    <style>
        :root { --neon: #00f2ff; --bg: #000814; --pink: #ff007a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; font-weight: bold; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; height: 100vh; width: 100vw; overflow: hidden; }

        .screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; flex-direction: column; align-items: center; background: radial-gradient(circle at center, #003d5c 0%, #000814 100%); z-index: 10; }
        .active { display: flex !important; z-index: 100; }

        .veksel-header { font-size: 2.2rem; letter-spacing: 6px; color: var(--neon); text-shadow: 0 0 15px var(--neon); margin: 20px 0; text-align: center; }
        .neon-btn { width: 280px; background: rgba(0, 242, 255, 0.1); border: 2px solid var(--neon); color: white; padding: 14px; border-radius: 12px; margin-bottom: 12px; text-transform: uppercase; text-align: center; cursor: pointer; font-size: 14px; box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }

        /* Стили презентации */
        .slide-box { width: 90%; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        
        .sketch-ui { position: relative; width: 280px; height: 180px; margin-bottom: 20px; border: 1px dashed rgba(0, 242, 255, 0.3); border-radius: 20px; display: flex; align-items: center; justify-content: center; }
        .avatar { width: 30px; height: 30px; border: 2px solid var(--neon); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; background: #000; position: absolute; }

        .back-btn { margin-top: auto; padding-bottom: 30px; color: var(--neon); cursor: pointer; text-transform: uppercase; font-size: 14px; text-decoration: underline; }
        canvas { filter: drop-shadow(0 0 10px var(--neon)); }
    </style>
</head>
<body onclick="playClick()">

<section id="splash" class="screen active" style="justify-content: center;">
    <canvas class="globe-canvas" width="220" height="220"></canvas>
    <div class="veksel-header">VEKSEL</div>
    <div style="width: 200px; height: 4px; background: #111; border-radius: 2px; overflow: hidden;"><div id="load-fill" style="width:0%; height:100%; background:var(--neon); transition:0.1s;"></div></div>
</section>

<section id="intro" class="screen">
    <div class="veksel-header" style="font-size: 1.5rem;">ОБУЧЕНИЕ</div>
    <div id="slide-content" class="slide-box">
        </div>
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <button id="prev-btn" class="neon-btn" style="width: 135px; border-color: gray; color: gray;" onclick="changeSlide(-1)">НАЗАД</button>
        <button id="next-btn" class="neon-btn" style="width: 135px;" onclick="changeSlide(1)">ДАЛЕЕ</button>
    </div>
</section>

<section id="menu" class="screen">
    <div class="veksel-header" style="margin-top: 80px;">VEKSEL</div>
    <button class="neon-btn" onclick="show('table')">СТОЛ</button>
    <button class="neon-btn" onclick="show('exchange')">ОБМЕН</button>
    <button class="neon-btn" onclick="show('withdraw')">ВЫВОД</button>
    <div class="back-btn" onclick="show('intro')">ИНСТРУКЦИЯ</div>
</section>

<section id="table" class="screen">
    <div class="veksel-header">СТОЛ</div>
    <div style="position: relative; width: 300px; height: 160px; border: 4px solid var(--neon); border-radius: 100px; margin-top: 50px; box-shadow: inset 0 0 20px var(--neon);">
        <div id="dynamic-seats"></div>
    </div>
    <div class="back-btn" onclick="show('menu')">В МЕНЮ</div>
</section>

<section id="exchange" class="screen">
    <canvas class="globe-canvas" width="120" height="120" style="margin-top:20px;"></canvas>
    <div class="veksel-header" style="font-size: 1.5rem;">ОБМЕН</div>
    <div style="width: 90%; border: 1px solid var(--neon); padding: 20px; border-radius: 15px;">
        <p style="font-size: 12px; opacity: 0.6;">ОТДАЕТЕ (TON)</p>
        <input type="number" value="1.0" style="width: 100%; background: none; border: none; border-bottom: 1px solid var(--neon); color: white; margin-bottom: 20px; font-size: 20px;">
        <p style="font-size: 12px; opacity: 0.6;">ПОЛУЧАЕТЕ (VEK)</p>
        <input type="number" value="100" style="width: 100%; background: none; border: none; border-bottom: 1px solid var(--neon); color: white; font-size: 20px;">
    </div>
    <button class="neon-btn" style="margin-top: 20px; border-color: var(--pink);">ОБМЕНЯТЬ</button>
    <div class="back-btn" onclick="show('menu')">В МЕНЮ</div>
</section>

<section id="withdraw" class="screen">
    <div class="veksel-header">ВЫВОД</div>
    <div style="width: 90%; border: 1px solid var(--neon); padding: 20px; border-radius: 15px; text-align: center;">
        <p style="font-size: 12px; margin-bottom: 10px;">СУММА (TON)</p>
        <input type="number" placeholder="0.00" style="width: 100%; background: none; border: none; border-bottom: 1px solid var(--neon); color: white; margin-bottom: 20px; text-align: center;">
        <p style="font-size: 12px; margin-bottom: 10px;">АДРЕС КОШЕЛЬКА</p>
        <input type="text" placeholder="UQ..." style="width: 100%; background: none; border: none; border-bottom: 1px solid var(--neon); color: white; text-align: center;">
    </div>
    <p style="margin-top: 20px; font-size: 14px; color: var(--neon);">БАЛАНС: 10.5 TON</p>
    <div class="back-btn" onclick="show('menu')">В МЕНЮ</div>
</section>

<script>
    let currentSlide = 0;
    const slides = [
        {
            title: "ШАГ 1: ВНОС",
            desc: "Каждый вносит по 10 TON в общий банк тура.",
            draw: () => `<div class="sketch-ui"><div style="font-size: 50px;">💰 ➔ 🏦</div></div>`
        },
        {
            title: "ШАГ 2: СТОЛ 10+1",
            desc: "10 человек за столом. Тур стартует, когда 11-й игрок встает в очередь.",
            draw: () => {
                let html = '<div class="sketch-ui"><div style="width:180px; height:80px; border:2px solid var(--neon); border-radius:50px;"></div>';
                for(let i=0; i<10; i++){
                    let a = (i/10)*Math.PI*2;
                    html += `<div class="avatar" style="left:${Math.cos(a)*100+125}px; top:${Math.sin(a)*50+75}px;">10</div>`;
                }
                html += `<div class="avatar" style="bottom:10px; left:125px; border-color:var(--pink);">11</div><div style="position:absolute; bottom:45px; font-size:20px;">↑</div></div>`;
                return html;
            }
        },
        {
            title: "ШАГ 3: ВЫПЛАТА",
            desc: "11-й игрок получает долю из фонда комиссий VEKSEL.",
            draw: () => `<div class="sketch-ui"><div style="font-size: 40px;">👥✅ ➔ 💎</div><div style="position:absolute; bottom:20px; color:var(--pink); font-size:11px;">COMMISSION FUND</div></div>`
        }
    ];

    function showSlide(idx) {
        const content = document.getElementById('slide-content');
        content.innerHTML = `
            ${slides[idx].draw()}
            <h2 style="color:var(--neon); margin-bottom:10px;">${slides[idx].title}</h2>
            <p style="font-size:14px; padding:0 20px; line-height:1.4;">${slides[idx].desc}</p>
        `;
        document.getElementById('prev-btn').style.opacity = idx === 0 ? "0.3" : "1";
        document.getElementById('next-btn').innerText = idx === slides.length - 1 ? "В МЕНЮ" : "ДАЛЕЕ";
    }

    function changeSlide(dir) {
        currentSlide += dir;
        if (currentSlide < 0) currentSlide = 0;
        if (currentSlide >= slides.length) { show('menu'); return; }
        showSlide(currentSlide);
    }

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'table') renderTable(10);
        if(id === 'intro') { currentSlide = 0; showSlide(0); }
    }

    function renderTable(count) {
        const layer = document.getElementById('dynamic-seats');
        layer.innerHTML = '';
        for (let i = 0; i < count; i++) {
            const a = (i / count) * Math.PI * 2;
            const x = 150 + 130 * Math.cos(a) - 16;
            const y = 80 + 65 * Math.sin(a) - 16;
            const p = document.createElement('div');
            p.className = 'player-node';
            p.style.left = x + 'px'; p.style.top = y + 'px';
            p.innerHTML = i === 0 ? 'Вы' : '👤';
            layer.appendChild(p);
        }
    }

    // ГЛОБУС
    let pts = [];
    for(let i=0; i<120; i++) {
        const t = Math.acos(-1 + (2*i)/120), p = Math.sqrt(120*Math.PI)*t;
        pts.push({x: Math.cos(p)*Math.sin(t), y: Math.sin(p)*Math.sin(t), z: Math.cos(t)});
    }
    let angle = 0;
    function draw() {
        angle += 0.015;
        document.querySelectorAll('.globe-canvas').forEach(cvs => {
            const ctx = cvs.getContext('2d');
            ctx.clearRect(0,0,cvs.width,cvs.width);
            pts.forEach(p => {
                const x1 = p.x*Math.cos(angle) - p.z*Math.sin(angle);
                const z1 = p.x*Math.sin(angle) + p.z*Math.cos(angle);
                const sc = 1 / (2.2 - z1);
                ctx.fillStyle = `rgba(0, 242, 255, ${(z1+1)/2})`;
                ctx.beginPath(); ctx.arc(x1*90*sc+cvs.width/2, p.y*90*sc+cvs.width/2, 1.5, 0, 7); ctx.fill();
            });
        });
        requestAnimationFrame(draw);
    }

    // ЗАГРУЗКА
    let prg = 0;
    const loader = setInterval(() => {
        prg += 2;
        document.getElementById('load-fill').style.width = prg + '%';
        if(prg >= 100) { clearInterval(loader); show('intro'); }
    }, 30);

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playClick() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.01, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    }

    draw();
</script>
</body>
</html>
