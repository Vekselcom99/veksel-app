<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VEKSEL FIX</title>
    <style>
        :root { --neon: #00f2ff; --bg: #000814; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; font-weight: bold; }
        body { background: var(--bg); color: white; height: 100vh; width: 100vw; overflow: hidden; }

        /* Экраны теперь строго разделены */
        .screen { 
            display: none; 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            flex-direction: column; 
            align-items: center; 
            background: radial-gradient(circle at center, #003d5c 0%, #000814 100%);
        }
        .active { display: flex; z-index: 100; }

        .veksel-header { font-size: 2.2rem; letter-spacing: 6px; color: var(--neon); text-shadow: 0 0 15px var(--neon); margin: 60px 0 30px; }
        
        .neon-btn {
            width: 280px; background: rgba(0, 242, 255, 0.1);
            border: 2px solid var(--neon); color: white; padding: 16px; border-radius: 12px;
            margin-bottom: 15px; text-transform: uppercase; text-align: center;
            box-shadow: 0 0 10px rgba(0,242,255,0.2);
        }

        /* Навигация */
        .top-nav { width: 100%; display: flex; justify-content: space-between; padding: 15px; position: absolute; top: 0; z-index: 200; }
        .icon-box { width: 45px; height: 45px; border: 1px solid var(--neon); border-radius: 12px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); }

        /* Стол */
        .table-area { position: relative; width: 300px; height: 150px; border: 4px solid var(--neon); border-radius: 100px; margin-top: 120px; box-shadow: inset 0 0 20px var(--neon); }
        .player { position: absolute; width: 32px; height: 32px; border: 2px solid var(--neon); border-radius: 50%; background: #000; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        .wait-block { margin-top: 20px; text-align: center; }

        /* Слайды (строго отдельно) */
        .rules-content { overflow-y: auto; width: 100%; padding: 20px; text-align: center; }
        .sketch-img { width: 120px; margin: 20px 0; }

        .back-btn { margin-top: auto; padding-bottom: 30px; color: var(--neon); text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

<section id="menu" class="screen active">
    <div class="top-nav">
        <div class="icon-box" onclick="show('exchange')">👛</div>
        <div class="icon-box" onclick="show('profile')">👤</div>
    </div>
    <div class="veksel-header">VEKSEL</div>
    <button class="neon-btn" onclick="show('table')">СТОЛ</button>
    <button class="neon-btn" onclick="show('exchange')">ОБМЕН</button>
    <button class="neon-btn" onclick="show('withdraw')">ВЫВОД</button>
    <button class="neon-btn" onclick="show('exchange')">ПОПОЛНИТЬ</button>
</section>

<section id="table" class="screen">
    <div class="top-nav">
        <div></div>
        <div class="icon-box" onclick="show('profile')">👤</div>
    </div>
    <div class="wait-block">
        <div class="player" style="position:static; margin: 0 auto 5px;">👤</div>
        <p style="font-size: 10px; color: var(--neon);">ЖДЕМ...</p>
    </div>
    <div class="table-area">
        <div style="position:absolute; width:100%; text-align:center; top:40%; font-size:14px;">100 VEKSEL</div>
        <div id="seats"></div>
    </div>
    <div class="back-btn" onclick="show('menu')">НАЗАД</div>
</section>

<section id="rules" class="screen">
    <div class="rules-content">
        <h2 style="color:var(--neon)">РАСПРЕДЕЛЕНИЕ</h2>
        <div style="font-size: 50px; margin: 20px;">💰 ➔ 💎</div>
        <p style="font-size: 14px; padding: 0 20px;">Взнос 11-го игрока мгновенно распределяется между всеми вами. Процесс обмена не начнется, пока один не встанет в очередь.</p>
        <button class="neon-btn" style="margin-top: 30px;" onclick="show('menu')">ВХОД</button>
    </div>
</section>

<section id="profile" class="screen">
    <div class="veksel-header" style="margin-top:20px;">VEKSEL</div>
    <div style="display:flex; width:100%; align-items:center; padding: 20px;">
        <div id="globe-placeholder" style="flex:1; height:150px; border: 2px dotted var(--neon); border-radius:50%;"></div>
        <div style="flex:1; display:flex; flex-direction:column; align-items:center;">
            <button class="neon-btn" style="width:140px; padding:10px; font-size:12px;" onclick="show('menu')">ГЛАВНАЯ</button>
            <button class="neon-btn" style="width:140px; padding:10px; font-size:12px;" onclick="show('rules')">ПРАВИЛА</button>
        </div>
    </div>
    <div class="back-btn" onclick="show('menu')">НАЗАД</div>
</section>

<section id="exchange" class="screen" style="justify-content:center;">
    <div style="border: 2px solid var(--neon); padding: 30px; border-radius: 20px; text-align:center; background: rgba(0,0,0,0.5);">
        <h2 style="color:var(--neon)">ОБМЕН</h2>
        <p style="font-size:12px; margin-top:15px;">ОТДАЕТЕ (TON)</p>
        <div style="border-bottom: 2px solid var(--neon); margin: 10px 0; font-size: 20px;">1</div>
        <p style="font-size:12px;">ПОЛУЧАЕТЕ (VEKSEL)</p>
        <div style="border-bottom: 2px solid var(--neon); margin: 10px 0; font-size: 20px;">100</div>
        <button class="neon-btn" style="margin-top:20px;">ОБМЕНЯТЬ</button>
    </div>
    <div class="back-btn" onclick="show('menu')">НАЗАД</div>
</section>

<script>
    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // Рассадка за столом
    const container = document.getElementById('seats');
    for(let i=0; i<10; i++) {
        const angle = (i/10) * Math.PI * 2;
        const x = 150 + 130 * Math.cos(angle) - 16;
        const y = 75 + 65 * Math.sin(angle) - 16;
        const p = document.createElement('div');
        p.className = 'player';
        p.style.left = x+'px'; p.style.top = y+'px';
        p.innerHTML = '👤';
        container.appendChild(p);
    }
</script>
</body>
</html>
