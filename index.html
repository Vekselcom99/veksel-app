<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VEKSEL</title>
    <style>
        :root { --blue: #0088cc; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .screen { display: none; width: 100vw; height: 100vh; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .active { display: flex; }

        /* ЭКРАН 1: ЗАГРУЗКА */
        .loader-bar { width: 80%; height: 25px; border: 2px solid #fff; margin-top: 20px; }
        .fill { width: 0%; height: 100%; background: repeating-linear-gradient(45deg, #fff, #fff 10px, #333 10px, #333 20px); transition: 2s; }

        /* ЭКРАН 6: ГЛАВНОЕ МЕНЮ (Глобус и кнопки) */
        .globe { width: 140px; height: 140px; border: 1px solid #333; border-radius: 50%; background: radial-gradient(circle, #222, #000); margin-bottom: 10px; }
        .menu-btns { width: 85%; display: flex; flex-direction: column; gap: 8px; }
        .m-btn { background: #1a1a1a; border: 1px solid #333; padding: 12px; font-weight: bold; font-size: 13px; text-transform: uppercase; cursor: pointer; }

        /* ЭКРАН 2 & 5: СТОЛЫ */
        .table-area { width: 220px; height: 220px; border: 1px solid #444; border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center; margin: 20px 0; }
        .player { position: absolute; width: 12px; height: 12px; background: #fff; border-radius: 50%; }

        /* ЭКРАН 4: ОБМЕН */
        .exch-card { border: 1px solid var(--blue); padding: 30px; width: 80%; border-radius: 10px; }
        .line { border-bottom: 1px solid #333; margin: 15px 0; }

        .action-btn { background: var(--blue); color: #fff; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 80%; margin-top: 20px; }
    </style>
</head>
<body onload="init()">

    <div id="sc1" class="screen active">
        <h1 style="letter-spacing: 5px;">VEKSEL</h1>
        <div class="loader-bar"><div id="bar" class="fill"></div></div>
        <p style="position: absolute; bottom: 40px; color: #555;">VEKSEL GRUP</p>
    </div>

    <div id="sc6" class="screen">
        <div style="width: 100%; text-align: left; padding: 0 20px; color: #666;">ПРОФИЛЬ 👤</div>
        <div class="globe">🌐</div>
        <h2 style="margin-top: 0;">VEKSEL</h2>
        <div class="menu-btns">
            <div class="m-btn" onclick="show(2)">ГЛАВНАЯ (СТОЛ)</div>
            <div class="m-btn" onclick="show(4)">ОБМЕН</div>
            <div class="m-btn">БАЛАНС</div>
            <div class="m-btn">ВЫВОД</div>
            <div class="m-btn">ПРАВИЛА</div>
        </div>
    </div>

    <div id="sc2" class="screen">
        <div class="table-area" id="t2"></div>
        <p>ВСЕГО В БАНКЕ: 110 TON</p>
        <p style="font-size: 12px; padding: 0 20px;">КАЖДЫЙ ВНОСИТ ПО 10 TON. ВСЕГО УЧАСТНИКОВ 10.</p>
        <button class="action-btn" onclick="show(3)">ДАЛЕЕ</button>
    </div>

    <div id="sc3" class="screen">
        <h3>ЦЕПОЧКА</h3>
        <p style="font-size: 12px; padding: 0 20px;">ЕСЛИ 11-Й НЕ ПОЛУЧИЛ ДЕНЬГИ, ЕГО ДОЛЯ КОМПЕНСИРУЕТСЯ ИЗ ФОНДА КОМИССИИ.</p>
        <div class="table-area" id="t3" style="width: 150px; height: 150px;"></div>
        <button class="action-btn" onclick="show(6)">ВЕРНУТЬСЯ В МЕНЮ</button>
    </div>

    <div id="sc4" class="screen">
        <div class="globe" style="width:60px; height:60px;">🌐</div>
        <div class="exch-card">
            <div style="display:flex; justify-content:space-between;"><span>TON</span><span>10</span></div>
            <div class="line"></div>
            <div style="display:flex; justify-content:space-between;"><span>VEKSEL</span><span>10</span></div>
            <button class="action-btn" style="width:100%;">ОБМЕНЯТЬ</button>
        </div>
        <p>balans: 0 VEK</p>
        <button onclick="show(6)" style="background:none; color:#555; border:none; margin-top:20px;">НАЗАД</button>
    </div>

    <script>
        function show(n) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('sc' + n).classList.add('active');
            if(n==2) draw('t2', 10);
            if(n==3) draw('t3', 8);
        }

        function init() {
            setTimeout(() => {
                document.getElementById('bar').style.width = '100%';
                setTimeout(() => show(6), 2200);
            }, 100);
        }

        function draw(id, count) {
            const el = document.getElementById(id); el.innerHTML = '';
            for(let i=0; i<count; i++) {
                const d = document.createElement('div'); d.className = 'player';
                const a = (i/count) * 2 * Math.PI;
                d.style.left = (el.offsetWidth/2 - 6 + (el.offsetWidth/2 - 10) * Math.cos(a)) + 'px';
                d.style.top = (el.offsetHeight/2 - 6 + (el.offsetHeight/2 - 10) * Math.sin(a)) + 'px';
                el.appendChild(d);
            }
        }
    </script>
</body>
</html>
